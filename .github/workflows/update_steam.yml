name: Update Steam Achievements

on:
  # Runs automatically every 12 hours (ITO UTC)
  schedule:
    - cron: '0 */12 * * *'
  
  workflow_dispatch:

jobs:
  update-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests mwclient

      - name: Run wiki update script
        env:
          WIKI_BOT_USERNAME: ${{ secrets.WIKI_BOT_USERNAME }}
          WIKI_BOT_PASSWORD: ${{ secrets.WIKI_BOT_PASSWORD }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        run: python update_wiki.py
